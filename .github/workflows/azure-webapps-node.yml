name: step deploy

on: 
  workflow_call:
    inputs:
      env:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy ${{ inputs.env }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    permissions: # <--- AGREGA ESTO AQUÍ TAMBIÉN
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: uv-artifact
          path: ./publish # Lo descargamos en una carpeta limpia

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'evaluacion-actions-antonio-instancia'
          # Desplegamos el contenido de la carpeta donde descargamos el artifact
          package: ./publish
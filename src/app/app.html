<main class="landing-container" (click)="showLoveMessage($event)">

  <div class="petals-physics-layer">
    <div *ngFor="let p of physicalPetals" class="physical-petal" #petalEl></div>
  </div>

  <div class="header-text">
    <h1>Anni</h1>
    <p>Para la artista que llena de color mi mundo.</p>
  </div>

  <div class="bouquet-interactive-zone" 
       [style.transform]="'translate(' + bouquetX + 'px, ' + bouquetY + 'px)'">
       
    <svg class="masterpiece-bouquet" viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="tulipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#FFF9C4" /> 
          <stop offset="50%" stop-color="#FFEB3B" />
          <stop offset="100%" stop-color="#FBC02D" />
        </linearGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
          <feOffset dx="0" dy="4" />
          <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
          <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>

      <g stroke="#43A047" stroke-width="4" fill="none" stroke-linecap="round">
        <path d="M150 380 Q145 300 110 180" />
        <path d="M150 380 Q155 300 190 180" />
        <path d="M150 380 L150 160" />
        <path d="M150 380 Q130 300 90 200" />
        <path d="M150 380 Q170 300 210 200" />
      </g>

      <path d="M110 320 L150 390 L190 320 Z" fill="#FCE4EC" opacity="0.8"/>
      <circle cx="150" cy="315" r="5" fill="#F06292" />

      <g filter="url(#softShadow)">
        <g class="tulip-unit t-center">
          <ellipse cx="150" cy="130" rx="22" ry="32" fill="url(#tulipGrad)"/>
          <path d="M150 98 L135 115 L150 110 L165 115 Z" fill="#FDD835"/>
        </g>
        <g class="tulip-unit t-left">
          <ellipse cx="100" cy="170" rx="18" ry="28" fill="url(#tulipGrad)"/>
          <path d="M100 142 L85 155 L100 150 L115 155 Z" fill="#FDD835"/>
        </g>
        <g class="tulip-unit t-right">
          <ellipse cx="200" cy="170" rx="18" ry="28" fill="url(#tulipGrad)"/>
          <path d="M200 142 L185 155 L200 150 L215 155 Z" fill="#FDD835"/>
        </g>
        <g class="tulip-unit t-far-left">
          <ellipse cx="70" cy="210" rx="15" ry="24" fill="url(#tulipGrad)"/>
          <path d="M70 186 L60 195 L70 192 L80 195 Z" fill="#FDD835"/>
        </g>
        <g class="tulip-unit t-far-right">
          <ellipse cx="230" cy="210" rx="15" ry="24" fill="url(#tulipGrad)"/>
          <path d="M230 186 L220 195 L230 192 L240 195 Z" fill="#FDD835"/>
        </g>
      </g>
    </svg>
  </div>

  <div class="floating-love" *ngFor="let msg of floatingMessages"
       [style.left.px]="msg.x" 
       [style.top.px]="msg.y">
    Te amo
  </div>

  <app-bunny></app-bunny>

</main>
